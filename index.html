<script>
const fmt = n => (!n||isNaN(n)) ? '' : Math.round(n).toLocaleString('ko-KR');
const unf = s => parseFloat((s+'').replace(/,/g,''))||0;
let uid=0, rowIds=[];

/* ── 토스트 ── */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}

/* ── 입력 필드 콤마 자동 포맷팅 (신규) ── */
function formatInput(el) {
  let val = String(el.value).replace(/[^0-9]/g, '');
  el.value = val === '' ? '' : Number(val).toLocaleString('ko-KR');
}

/* ── 계산 핵심 (100단위 반올림 적용) ── */
function calcValues(b,c,f,g,k){
  const d   = b>0&&c>0 ? b*c : 0;
  const e   = b>0 ? Math.round((b*1.04)/100)*100 : '';
  
  const jv  = f>0 ? Math.round(f*0.9) : 0;
  const h   = f>0&&g>0 ? f*g : 0;
  
  const i   = (f>0&&g>0&&c>0) ? Math.round(((b*c+f*g)*1.04/(c+g))/100)*100 : '';
  
  const l   = jv>0&&k>0 ? jv*k : 0;
  const tq3 = c+(g||0)+(k||0);
  const ta3 = b*c+(f>0&&g>0?f*g:0)+(jv>0&&k>0?jv*k:0);
  
  const m   = jv>0&&k>0&&tq3>0 ? Math.round((ta3*1.04/tq3)/100)*100 : '';
  
  const tq  = c+(f>0&&g>0?g:0)+(jv>0&&k>0?k:0);
  const ta  = b*c+(f>0&&g>0?f*g:0)+(jv>0&&k>0?jv*k:0);
  const avg = tq>0&&ta>0 ? Math.round(ta/tq) : '';
  
  return {d,e,jv,h,i,l,m,tq,ta,avg};
}

/* ── PC 행 추가 ── */
function addRow(data){
  const id=uid++; rowIds.push(id);
  const tb=document.getElementById('tbody');
  const tr=document.createElement('tr'); tr.id='row-'+id;
  tr.innerHTML=`
    <td class="nm csep"><input type="text" class="ni" placeholder="종목명" id="nm${id}" oninput="onNamePC(${id})"></td>
    <td><input type="text" inputmode="numeric" id="b${id}" placeholder="0" oninput="formatInput(this); calc(${id})"></td>
    <td><input type="text" inputmode="numeric" id="c${id}" placeholder="0" oninput="formatInput(this); calc(${id})"></td>
    <td class="ca" id="d${id}"></td>
    <td class="gc csep" id="e${id}"></td>
    <td><input type="text" inputmode="numeric" id="f${id}" placeholder="0" oninput="formatInput(this); calc(${id})"></td>
    <td><input type="text" inputmode="numeric" id="g${id}" placeholder="0" oninput="formatInput(this); calc(${id})"></td>
    <td class="ca" id="h${id}"></td>
    <td class="gc csep" id="i${id}"></td>
    <td class="ac2" id="j${id}"></td>
    <td><input type="text" inputmode="numeric" id="k${id}" placeholder="0" oninput="formatInput(this); calc(${id})"></td>
    <td class="ca" id="l${id}"></td>
    <td class="gc csep" id="m${id}"></td>
    <td class="pc" id="n${id}"></td>
    <td class="pc" id="o${id}"></td>
    <td class="pc" id="p${id}"></td>
    <td style="text-align:center;padding:0 3px;border-left:1px solid var(--bd);">
      <button class="xbtn" onclick="delRow(${id})">✕</button>
    </td>`;
  tb.appendChild(tr);
  addMCard(id);
  if(data) applyData(id,data);
}

function applyData(id,data){
  const set=(f,v)=>{const el=document.getElementById(f+id);if(el&&v!=null&&v!=='')el.value=v;};
  const format=(f)=>{const el=document.getElementById(f+id);if(el&&el.value) formatInput(el);};

  set('nm',data.name); set('b',data.b); set('c',data.c);
  set('f',data.f); set('g',data.g); set('k',data.k);
  ['b','c','f','g','k'].forEach(format);

  const mset=(f,v)=>{const el=document.getElementById('m'+f+id);if(el&&v!=null&&v!=='')el.value=v;};
  const mformat=(f)=>{const el=document.getElementById('m'+f+id);if(el&&el.value) formatInput(el);};

  mset('nm',data.name); mset('b',data.b); mset('c',data.c);
  mset('f',data.f); mset('g',data.g); mset('k',data.k);
  ['b','c','f','g','k'].forEach(mformat);

  const mhdr=document.getElementById('mhdr-nm'+id);
  if(mhdr&&data.name) mhdr.value=data.name;
  calc(id);
}

/* ── 모바일 카드 추가 ── */
function addMCard(id){
  const ml=document.getElementById('mlist');
  const div=document.createElement('div'); div.id='mc-'+id; div.className='m-card';
  div.innerHTML=`
    <div class="m-card-hdr" style="background:var(--g1b);">
      <input type="text" class="m-hdr-nm" placeholder="종목명 입력" id="mhdr-nm${id}" oninput="onNameMob(${id})">
      <button class="xbtn" style="color:rgba(255,255,255,.7);" onclick="delRow(${id})">✕</button>
    </div>
    <div class="m-card-body">
      <div class="m-sec-lbl" style="background:var(--g2b);">1차 매수</div>
      <div class="m-field"><div class="m-lbl">매수단가 (원)</div>
        <input type="text" inputmode="numeric" class="m-inp" id="mb${id}" placeholder="0" oninput="formatInput(this); syncMob('b',${id})"></div>
      <div class="m-field"><div class="m-lbl">수량 (주)</div>
        <input type="text" inputmode="numeric" class="m-inp" id="mc${id}" placeholder="0" oninput="formatInput(this); syncMob('c',${id})"></div>
      <div class="m-field"><div class="m-lbl">총액 (원)</div><div class="m-val" id="md${id}"></div></div>
      <div class="m-field"><div class="m-lbl">4% 판매가 (원)</div><div class="m-val gn" id="me${id}"></div></div>
      <div class="m-sep"></div>
      <div class="m-sec-lbl" style="background:var(--g3b);">2차 매수</div>
      <div class="m-field"><div class="m-lbl">매수단가 (원)</div>
        <input type="text" inputmode="numeric" class="m-inp" id="mf${id}" placeholder="0" oninput="formatInput(this); syncMob('f',${id})"></div>
      <div class="m-field"><div class="m-lbl">수량 (주)</div>
        <input type="text" inputmode="numeric" class="m-inp" id="mg${id}" placeholder="0" oninput="formatInput(this); syncMob('g',${id})"></div>
      <div class="m-field"><div class="m-lbl">총액 (원)</div><div class="m-val" id="mh${id}"></div></div>
      <div class="m-field"><div class="m-lbl">판매가 (원)</div><div class="m-val gn" id="mi${id}"></div></div>
      <div class="m-sep"></div>
      <div class="m-sec-lbl" style="background:var(--g4b);">3차 매수</div>
      <div class="m-field"><div class="m-lbl">매수단가 (2차×90%)</div><div class="m-val am" id="mj${id}"></div></div>
      <div class="m-field"><div class="m-lbl">수량 (주)</div>
        <input type="text" inputmode="numeric" class="m-inp" id="mk${id}" placeholder="0" oninput="formatInput(this); syncMob('k',${id})"></div>
      <div class="m-field"><div class="m-lbl">총액 (원)</div><div class="m-val" id="ml${id}"></div></div>
      <div class="m-field"><div class="m-lbl">판매가 (원)</div><div class="m-val gn" id="mm${id}"></div></div>
      <div class="m-sep"></div>
      <div class="m-sec-lbl" style="background:var(--g5b);">합산 결과</div>
      <div class="m-field"><div class="m-lbl">합산수량 (주)</div><div class="m-val pu" id="mn${id}"></div></div>
      <div class="m-field"><div class="m-lbl">합산총액 (원)</div><div class="m-val pu" id="mo${id}"></div></div>
      <div class="m-field" style="grid-column:1/-1;">
        <div class="m-lbl">평균단가 (원)</div><div class="m-val pu" id="mp${id}"></div></div>
    </div>`;
  ml.appendChild(div);
}

function onNamePC(id){
  const v=document.getElementById('nm'+id)?.value||'';
  const mh=document.getElementById('mhdr-nm'+id); if(mh) mh.value=v;
  autoSave();
}
function onNameMob(id){
  const v=document.getElementById('mhdr-nm'+id)?.value||'';
  const pc=document.getElementById('nm'+id); if(pc) pc.value=v;
  autoSave();
}

function syncMob(field,id){
  const mv=document.getElementById('m'+field+id)?.value||'';
  const pc=document.getElementById(field+id); if(pc) pc.value=mv;
  calc(id);
}

function calc(id){
  const b=unf(document.getElementById('b'+id)?.value);
  const c=unf(document.getElementById('c'+id)?.value);
  const f=unf(document.getElementById('f'+id)?.value);
  const g=unf(document.getElementById('g'+id)?.value);
  const k=unf(document.getElementById('k'+id)?.value);
  const v=calcValues(b,c,f,g,k);

  const s=(sel,val)=>{const el=document.getElementById(sel+id);if(el)el.textContent=fmt(val)||'';};
  s('d',v.d);s('e',v.e);s('j',v.jv);s('h',v.h);s('i',v.i);
  s('l',v.l);s('m',v.m);s('n',v.tq);s('o',v.ta);s('p',v.avg);

  const ms=(pre,val)=>{const el=document.getElementById('m'+pre+id);if(el)el.textContent=fmt(val)||'';};
  ms('d',v.d);ms('e',v.e);ms('j',v.jv);ms('h',v.h);ms('i',v.i);
  ms('l',v.l);ms('m',v.m);ms('n',v.tq);ms('o',v.ta);ms('p',v.avg);

  ['b','c','f','g','k'].forEach(field=>{
    const pc=document.getElementById(field+id);
    const mob=document.getElementById('m'+field+id);
    if(pc&&mob&&document.activeElement!==mob) mob.value=pc.value;
  });

  updateSummary();
  autoSave();
}

function delRow(id){
  document.getElementById('row-'+id)?.remove();
  document.getElementById('mc-'+id)?.remove();
  rowIds=rowIds.filter(r=>r!==id);
  updateSummary(); autoSave();
}

function updateSummary(){
  let cnt=0,a1=0,a2=0,a3=0,tq=0,ta=0;
  rowIds.forEach(id=>{
    if(!document.getElementById('row-'+id)) return;
    const b=unf(document.getElementById('b'+id)?.value);
    const c=unf(document.getElementById('c'+id)?.value);
    const f=unf(document.getElementById('f'+id)?.value);
    const g=unf(document.getElementById('g'+id)?.value);
    const k=unf(document.getElementById('k'+id)?.value);
    const jv=f>0?Math.round(f*.9):0;
    if(b>0&&c>0) cnt++;
    a1+=b*c;
    a2+=f>0&&g>0?f*g:0;
    a3+=jv>0&&k>0?jv*k:0;
    tq+=c+(f>0&&g>0?g:0)+(jv>0&&k>0?k:0);
    ta+=b*c+(f>0&&g>0?f*g:0)+(jv>0&&k>0?jv*k:0);
  });
  document.getElementById('s-cnt').textContent=cnt;
  document.getElementById('s-a1').textContent=a1>0?fmt(a1)+'원':'-';
  document.getElementById('s-a2').textContent=a2>0?fmt(a2)+'원':'-';
  document.getElementById('s-a3').textContent=a3>0?fmt(a3)+'원':'-';
  document.getElementById('s-tot').textContent=ta>0?fmt(ta)+'원':'-';
  document.getElementById('s-qty').textContent=tq>0?fmt(tq)+'주':'-';
  document.getElementById('tfoot').innerHTML=`<tr>
    <td class="nm">합 계</td><td></td><td></td>
    <td>${fmt(a1)}</td><td class="csep"></td>
    <td></td><td></td><td>${fmt(a2)}</td><td class="csep"></td>
    <td></td><td></td><td>${fmt(a3)}</td><td class="csep"></td>
    <td>${fmt(tq)}</td><td>${fmt(ta)}</td><td></td><td></td></tr>`;
}

function resetAll(){
  if(!confirm('전체 데이터를 초기화합니까?')) return;
  rowIds=[];uid=0;
  document.getElementById('tbody').innerHTML='';
  document.getElementById('tfoot').innerHTML='';
  document.getElementById('mlist').innerHTML='';
  addRow();addRow();addRow();
  updateSummary(); autoSave();
}

function saveCSV(){
  const hdr=['종목명','1차단가','1차수량','1차총액','1차판매가',
             '2차단가','2차수량','2차총액','2차판매가',
             '3차단가(자동)','3차수량','3차총액','3차판매가',
             '합산수량','합산총액','평균단가'];
  const lines=[hdr.join(',')];
  rowIds.forEach(id=>{
    if(!document.getElementById('row-'+id)) return;
    const nm=document.getElementById('nm'+id)?.value||'';
    const b=document.getElementById('b'+id)?.value||'';
    if(!nm&&!b) return;
    const gv=f=>document.getElementById(f+id)?.textContent.replace(/,/g,'')||'';
    const iv=f=>(document.getElementById(f+id)?.value||'').replace(/,/g,''); // CSV 구조 오류 방지 (콤마 제거)
    lines.push([nm,iv('b'),iv('c'),gv('d'),gv('e'),iv('f'),iv('g'),gv('h'),gv('i'),
                gv('j'),iv('k'),gv('l'),gv('m'),gv('n'),gv('o'),gv('p')].join(','));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='종목매수계산기_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV 파일이 저장되었습니다.');
}

function loadCSV(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const text=ev.target.result.replace(/^\uFEFF/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){toast('불러올 데이터가 없습니다.');return;}
    rowIds=[];uid=0;
    document.getElementById('tbody').innerHTML='';
    document.getElementById('tfoot').innerHTML='';
    document.getElementById('mlist').innerHTML='';
    let loaded=0;
    lines.slice(1).forEach(line=>{
      const cols=line.split(',');
      const nm=cols[0]||'';
      const b=cols[1]; const c=cols[2];
      const f=cols[5]; const g=cols[6]; const k=cols[10];
      addRow({
        name:nm,
        b:b&&!isNaN(b)?+b:undefined,
        c:c&&!isNaN(c)?+c:undefined,
        f:f&&!isNaN(f)?+f:undefined,
        g:g&&!isNaN(g)?+g:undefined,
        k:k&&!isNaN(k)?+k:undefined,
      });
      loaded++;
    });
    updateSummary(); autoSave();
    toast(`${loaded}개 종목을 불러왔습니다.`);
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
}

let saveTimer=null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      const getVal=f=>(document.getElementById(f+id)?.value||'').replace(/,/g,''); // 로컬 저장용 콤마 제거 처리
      const data=rowIds.filter(id=>document.getElementById('row-'+id)).map(id=>({
        name:document.getElementById('nm'+id)?.value||'',
        b:getVal('b'), c:getVal('c'), f:getVal('f'),
        g:getVal('g'), k:getVal('k'),
      }));
      localStorage.setItem('smc_data',JSON.stringify(data));
      const badge=document.getElementById('save-badge');
      const now=new Date();
      const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      badge.innerHTML=`💾 <span>저장됨 ${t}</span>`;
    }catch(e){}
  },800);
}

function loadSaved(){
  try{
    const raw=localStorage.getItem('smc_data');
    if(!raw) return false;
    const data=JSON.parse(raw);
    if(!Array.isArray(data)||data.length===0) return false;
    data.forEach(d=>addRow({
      name:d.name,
      b:d.b?+d.b:undefined,c:d.c?+d.c:undefined,
      f:d.f?+d.f:undefined,g:d.g?+d.g:undefined,k:d.k?+d.k:undefined
    }));
    return true;
  }catch(e){return false;}
}

function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('smc_theme',t);
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
}

setTheme(localStorage.getItem('smc_theme')||'light');
if(!loadSaved()){
  addRow();
  addRow();
  addRow();
}
updateSummary();
</script>
